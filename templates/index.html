<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Letras</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.2rem;
      color: #e91e8c;
      letter-spacing: 3px;
      margin-bottom: 30px;
      text-shadow: 0 0 20px #e91e8c88;
    }

    .input-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 700px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 14px 18px;
      border-radius: 10px;
      border: 2px solid #333;
      background: #1a1a1a;
      color: #f0f0f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #e91e8c; }

    button {
      padding: 14px 26px;
      border-radius: 10px;
      border: none;
      background: #e91e8c;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #c0166e; }
    button:active { transform: scale(0.97); }
    button:disabled { background: #555; cursor: default; }

    .back-btn {
      background: transparent;
      color: #aaa;
      border: 1px solid #444;
      padding: 8px 18px;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }
    .back-btn:hover { background: #1a1a1a; color: #f0f0f0; }

    #share-btn {
      background: transparent;
      color: #aaa;
      border: 1px solid #444;
      padding: 6px 14px;
      font-size: 0.85rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    #share-btn:hover { background: #1a1a1a; color: #f0f0f0; border-color: #666; }
    #share-btn.copied { background: #1a3a1a; color: #5f5; border-color: #5f5; }
    #share-from-here {
      display: none;
      font-size: 0.75rem;
      color: #666;
      cursor: pointer;
      margin-top: 3px;
      text-align: center;
      transition: color 0.2s;
    }
    #share-from-here:hover { color: #aaa; }
    #share-from-here.copied { color: #5f5; }

    #player-back {
      position: absolute;
      top: 10px;
      left: 14px;
      background: transparent;
      color: #666;
      border: 1px solid #333;
      padding: 4px 10px;
      font-size: 0.8rem;
      border-radius: 8px;
      cursor: pointer;
      z-index: 20;
    }
    #player-back:hover { color: #aaa; border-color: #555; background: #1a1a1a; }

    #status, #search-status {
      font-size: 0.95rem;
      color: #aaa;
      margin-bottom: 10px;
      min-height: 1.3em;
      text-align: center;
      width: 100%;
    }
    #status.error, #search-status.error {
      color: #ff4444;
      font-size: 1.1rem;
      font-weight: bold;
    }

    #progress-wrap, #search-progress-wrap {
      width: 100%;
      max-width: 700px;
      height: 6px;
      background: #222;
      border-radius: 3px;
      margin-bottom: 20px;
      overflow: hidden;
      display: none;
    }
    #progress-bar, #search-progress-bar {
      height: 100%;
      width: 0%;
      background: #e91e8c;
      border-radius: 3px;
      transition: width 0.6s ease;
    }
    #progress-bar.indeterminate {
      width: 40%;
      animation: slide 1.4s infinite ease-in-out;
    }
    @keyframes slide {
      0%   { transform: translateX(-150%); }
      100% { transform: translateX(350%); }
    }

    /* Results grid */
    #results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 700px;
    }

    .song-card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      border: 2px solid transparent;
    }
    .song-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px #e91e8c44;
      border-color: #e91e8c;
    }
    .song-card img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      background: #111;
    }
    .song-card-title {
      padding: 10px 12px;
      font-size: 0.85rem;
      color: #ddd;
      line-height: 1.4;
    }

    /* Player */
    #song-title {
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffd700;
      margin-bottom: 8px;
      text-align: center;
      max-width: 700px;
    }

    #song-credits {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 4px;
      text-align: center;
      letter-spacing: 0.3px;
    }

    #translation-bar {
      display: none;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    #translate-select {
      background: #1a1a1a;
      color: #aaa;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }
    #translate-select:hover { border-color: #555; color: #ddd; }
    #translate-select:focus { border-color: #e91e8c66; }

    .translation {
      width: 100%;
      font-size: 0.95rem;
      color: #777;
      margin-top: 6px;
      font-style: italic;
      line-height: 1.5;
    }

    #source-label {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 10px;
      text-align: center;
    }

    #video-row {
      width: 100%;
      max-width: 700px;
      display: flex;
      align-items: stretch;
      gap: 8px;
      margin-bottom: 8px;
    }

    #offset-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-shrink: 0;
    }
    #offset-controls button {
      padding: 5px 10px;
      font-size: 0.8rem;
      background: #222;
      border: 1px solid #444;
      color: #ccc;
      width: 52px;
    }
    #offset-controls button:hover { background: #333; color: #fff; }
    #offset-display {
      font-size: 0.75rem;
      color: #aaa;
      text-align: center;
      width: 52px;
    }

    #screen-player {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0d0d0d;
      z-index: 10;
      overflow: hidden;
      padding: 12px 20px 0;
    }

    #player-top {
      width: 100%;
      max-width: 700px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #yt-player-wrap {
      flex: 1;
      min-width: 0;
      border-radius: 12px;
      overflow: hidden;
      display: none;
      aspect-ratio: 16/9;
      background: #111;
      max-height: 32vh;
    }

    #lyrics {
      width: 100%;
      max-width: 700px;
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #lyrics::-webkit-scrollbar { width: 4px; }
    #lyrics::-webkit-scrollbar-track { background: transparent; }
    #lyrics::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .segment {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 14px 18px;
      background: #1a1a1a;
      border-radius: 12px;
      border-left: 4px solid transparent;
      transition: border-color 0.3s, background 0.3s;
      line-height: 1.8;
    }
    .segment.active {
      border-left-color: #e91e8c;
      background: #2a1020;
    }
    .word {
      font-size: 1.3rem;
      padding: 2px 4px;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
    }
    .word.active {
      background: #e91e8c;
      color: white;
      border-radius: 6px;
    }

    .screen {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .hidden { display: none !important; }

    #site-footer, #player-footer {
      margin-top: auto;
      padding: 28px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      opacity: 0.45;
      transition: opacity 0.25s;
    }
    #site-footer:hover, #player-footer:hover { opacity: 1; }
    #site-footer a, #player-footer a { text-decoration: none; display: flex; align-items: center; }
    .footer-credit {
      color: #888;
      font-size: 0.82rem;
      letter-spacing: 0.3px;
    }
    .footer-sep {
      color: #444;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>🎤 LETRAS</h1>

  <!-- Search screen -->
  <div id="screen-search" class="screen">
    <div class="input-row">
      <input type="text" id="searchInput" placeholder="Search for a song…" />
      <button id="searchBtn" onclick="doSearch()">Search</button>
    </div>
    <div id="search-status"></div>
    <div id="search-progress-wrap"><div id="search-progress-bar"></div></div>
  </div>

  <!-- Results screen -->
  <div id="screen-results" class="screen hidden">
    <div style="width:100%;max-width:700px;margin-bottom:16px">
      <button class="back-btn" onclick="showSearch()">← Back</button>
    </div>
    <div id="results-grid"></div>
  </div>

  <!-- Player screen -->
  <div id="screen-player" class="screen hidden">
    <button id="player-back" onclick="showResults()">← Back</button>
    <div id="player-top">
      <div id="status"></div>
      <div id="progress-wrap"><div id="progress-bar"></div></div>
      <div id="song-title"></div>
      <div id="song-credits"></div>
      <div id="source-label"></div>
      <div id="translation-bar">
        <select id="translate-select" onchange="onTranslateLangChange()">
          <option value="">🌐 Translate…</option>
          <option value="en">English</option>
          <option value="he">עברית</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
          <option value="ru">Русский</option>
          <option value="ar">العربية</option>
          <option value="pt">Português</option>
          <option value="ja">日本語</option>
        </select>
        <div style="display:flex;flex-direction:column;align-items:center;">
          <button id="share-btn" onclick="shareUrl()">🔗 Share</button>
          <span id="share-from-here" onclick="shareFromHere()">· from here (0:00)</span>
        </div>
      </div>
      <div id="video-row">
        <div id="offset-controls">
          <button onclick="adjustOffset(-1)">-1s</button>
          <button onclick="adjustOffset(-0.5)">-0.5s</button>
          <span id="offset-display">+0.0s</span>
          <button onclick="adjustOffset(0.5)">+0.5s</button>
          <button onclick="adjustOffset(1)">+1s</button>
        </div>
        <div id="yt-player-wrap"><div id="yt-player"></div></div>
      </div>
    </div>
    <div id="lyrics"></div>
    <footer id="player-footer">
      <a href="https://www.gnu.org/licenses/gpl-3.0.html" target="_blank" rel="noopener" title="GNU General Public License v3.0">
        <svg xmlns="http://www.w3.org/2000/svg" width="116" height="22" viewBox="0 0 116 22" role="img" aria-label="license: GPL-3.0">
          <title>license: GPL-3.0</title>
          <defs>
            <clipPath id="gpl-clip2">
              <rect width="116" height="22" rx="4" fill="#fff"/>
            </clipPath>
          </defs>
          <g clip-path="url(#gpl-clip2)">
            <rect width="56" height="22" fill="#2a2a2a"/>
            <rect x="56" width="60" height="22" fill="#e91e8c"/>
          </g>
          <text x="28" y="15" fill="#bbb" font-family="Segoe UI,DejaVu Sans,sans-serif" font-size="10.5" text-anchor="middle">license</text>
          <text x="86" y="15.5" fill="#fff" font-family="Segoe UI,DejaVu Sans,sans-serif" font-size="10.5" font-weight="bold" text-anchor="middle">GPL-3.0</text>
        </svg>
      </a>
      <span class="footer-sep">·</span>
      <span class="footer-credit">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:5px;margin-bottom:2px">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>Ori Mosenzon
      </span>
    </footer>
  </div>

  <script>
    // Load YouTube IFrame API dynamically
    (function() {
      var tag = document.createElement('script');
      tag.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(tag);
    })();

    var ytPlayer = null;
    var ytApiReady = false;
    var pendingVideoId = null;
    var syncTimer = null;
    var segments = [];
    var pollTimer = null;
    var syncOffset = 0;
    var currentScreen = 'search';

    window.onYouTubeIframeAPIReady = function() {
      ytApiReady = true;
      if (pendingVideoId) {
        _createOrLoadPlayer(pendingVideoId);
        pendingVideoId = null;
      }
    };

    function loadYTVideo(videoId) {
      if (!ytApiReady) {
        pendingVideoId = videoId;
        return;
      }
      _createOrLoadPlayer(videoId);
    }

    function _createOrLoadPlayer(videoId) {
      document.getElementById('yt-player-wrap').style.display = 'block';
      const seekTo = pendingSeekTime;
      pendingSeekTime = 0;
      if (ytPlayer && ytPlayer.loadVideoById) {
        if (seekTo > 0) {
          ytPlayer.loadVideoById({ videoId: videoId, startSeconds: seekTo });
        } else {
          ytPlayer.loadVideoById(videoId);
        }
        startSync();
        return;
      }
      ytPlayer = new YT.Player('yt-player', {
        width: '100%',
        height: '100%',
        videoId: videoId,
        playerVars: { autoplay: 1, rel: 0, start: seekTo > 0 ? Math.floor(seekTo) : 0 },
        events: {
          onReady: function(e) {
            if (seekTo > 0) e.target.seekTo(seekTo, true);
            e.target.playVideo();
            startSync();
          }
        }
      });
    }

    var shareUpdateCounter = 0;
    function startSync() {
      stopSync();
      syncTimer = setInterval(function() {
        if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
        syncLyrics(ytPlayer.getCurrentTime() + syncOffset);
        if (++shareUpdateCounter % 10 === 0) updateShareFromHere();
      }, 100);
    }

    var currentVideoId = null;
    var currentSongId = null;
    var currentSongTitle = '';
    var currentTranslations = {};
    var pendingSeekTime = 0;
    var urlUpdateTimer = null;

    function adjustOffset(delta) {
      syncOffset = Math.round((syncOffset + delta) * 10) / 10;
      document.getElementById('offset-display').textContent = (syncOffset >= 0 ? '+' : '') + syncOffset.toFixed(1) + 's';
      if (currentVideoId) localStorage.setItem('letras_offset_' + currentVideoId, syncOffset);
    }

    function loadOffset(videoId) {
      const stored = localStorage.getItem('letras_offset_' + videoId);
      syncOffset = stored !== null ? parseFloat(stored) : 0;
      document.getElementById('offset-display').textContent = (syncOffset >= 0 ? '+' : '') + syncOffset.toFixed(1) + 's';
    }

    function stopSync() {
      if (syncTimer) { clearInterval(syncTimer); syncTimer = null; }
    }

    function stopPlayer() {
      stopSync();
      if (ytPlayer && ytPlayer.stopVideo) ytPlayer.stopVideo();
      document.getElementById('yt-player-wrap').style.display = 'none';
    }

    const CREDITS_LABELS = {
      he: { lyrics: 'מילים', music: 'לחן', both: 'מילים ולחן', arranger: 'עיבוד', performer: 'מבצע' },
      en: { lyrics: 'Lyrics', music: 'Music', both: 'Music & Lyrics', arranger: 'Arr.', performer: 'By' },
      ar: { lyrics: 'كلمات', music: 'ألحان', both: 'كلمات وألحان', arranger: 'توزيع', performer: 'أداء' },
      ru: { lyrics: 'Слова', music: 'Музыка', both: 'Слова и музыка', arranger: 'Аранж.', performer: 'Исп.' },
      fr: { lyrics: 'Paroles', music: 'Musique', both: 'Paroles et Musique', arranger: 'Arr.', performer: 'Par' },
      es: { lyrics: 'Letra', music: 'Música', both: 'Letra y Música', arranger: 'Arr.', performer: 'Por' },
      it: { lyrics: 'Testo', music: 'Musica', both: 'Testo e Musica', arranger: 'Arr.', performer: 'Perf.' },
      de: { lyrics: 'Text', music: 'Musik', both: 'Text und Musik', arranger: 'Arr.', performer: 'Von' },
      pt: { lyrics: 'Letra', music: 'Música', both: 'Letra e Música', arranger: 'Arr.', performer: 'Por' },
      ja: { lyrics: '作詞', music: '作曲', both: '作詞・作曲', arranger: '編曲', performer: '歌' },
      ko: { lyrics: '작사', music: '작곡', both: '작사·작곡', arranger: '편곡', performer: '노래' },
      zh: { lyrics: '词曲', music: '作曲', both: '词曲', arranger: '编曲', performer: '演唱' },
    };

    function renderCredits(data) {
      const labels = CREDITS_LABELS[data.lang] || CREDITS_LABELS.en;
      const lyricist  = data.lyricist  || null;
      const composer  = data.composer  || null;
      const arranger  = data.arranger  || null;
      const performer = data.performer || null;
      const parts = [];
      if (performer) parts.push(`${labels.performer}: ${performer}`);
      if (lyricist && composer && lyricist === composer) {
        parts.push(`${labels.both}: ${lyricist}`);
      } else {
        if (composer) parts.push(`${labels.music}: ${composer}`);
        if (lyricist) parts.push(`${labels.lyrics}: ${lyricist}`);
      }
      if (arranger) parts.push(`${labels.arranger}: ${arranger}`);
      document.getElementById('song-credits').textContent = parts.join(' · ');
    }

    const STAGE_LABELS = {
      starting:    'Starting…',
      captions:    'Fetching captions…',
      lrclib:      'Searching lyrics database…',
      cached:      'Loading from cache…',
    };

    function showScreen(name) {
      currentScreen = name;
      ['search', 'results', 'player'].forEach(s => {
        document.getElementById(`screen-${s}`).classList.toggle('hidden', s !== name);
      });
    }

    function showSearch() {
      stopUrlUpdater();
      history.replaceState(null, '', '/');
      showScreen('search');
      setStatus('');
      setProgress('hide');
    }

    function showResults() {
      stopUrlUpdater();
      history.replaceState(null, '', '/');
      stopPlayer();
      document.getElementById('translation-bar').style.display = 'none';
      showScreen('results');
      setStatus('');
      setProgress('hide');
    }

    async function doSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;

      const btn = document.getElementById('searchBtn');
      btn.disabled = true;
      setStatus('Searching…');
      setProgress('indeterminate');

      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();

        setProgress('hide');

        if (!data.results || data.results.length === 0) {
          setStatus('No songs found with available lyrics. Try a different search.', true);
          btn.disabled = false;
          return;
        }

        renderResults(data.results);
        setStatus('');
        showScreen('results');
      } catch (e) {
        setStatus('Search failed: ' + e.message, true);
        setProgress('hide');
      }

      btn.disabled = false;
    }

    function renderResults(results) {
      const grid = document.getElementById('results-grid');
      grid.innerHTML = '';
      results.forEach(r => {
        const card = document.createElement('div');
        card.className = 'song-card';
        card.innerHTML = `
          <img src="${r.thumbnail}" alt="" loading="lazy" onerror="this.style.background='#222'">
          <div class="song-card-title">${r.title}</div>
        `;
        card.onclick = () => selectSong(r);
        grid.appendChild(card);
      });
    }

    async function selectSong(song, startTime = 0, autoLang = '') {
      showScreen('player');
      document.getElementById('song-title').textContent = '';
      document.getElementById('song-credits').textContent = '';
      document.getElementById('lyrics').innerHTML = '';
      stopPlayer();
      pendingSeekTime = startTime;

      setStatus('Starting…');
      setProgress('indeterminate');

      let jobId = null;
      try {
        const idRes = await fetch('/api/job_id', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: song.url })
        });
        jobId = (await idRes.json()).id;
      } catch (_) {}

      if (jobId) {
        pollTimer = setInterval(async () => {
          try {
            const r = await fetch(`/api/status/${jobId}`);
            const s = await r.json();
            updateProgressUI(s);
          } catch (_) {}
        }, 800);
      }

      try {
        const res = await fetch('/api/process', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: song.url, title: song.title })
        });
        const data = await res.json();

        clearInterval(pollTimer);
        pollTimer = null;

        if (data.error) {
          setStatus(data.error, true);
          setProgress('hide');
          return;
        }

        setProgress('full');
        setStatus('');
        segments = data.segments;
        currentSongTitle = data.title || song.title;
        document.getElementById('song-title').textContent = currentSongTitle;
        renderCredits(data);
        const sourceMap = { youtube_captions: 'YouTube captions', lrclib: 'LRClib', cached: 'cached' };
        document.getElementById('source-label').textContent = data.source ? '(' + (sourceMap[data.source] || data.source) + ')' : '';
        renderLyrics(segments);

        currentSongId = data.id;
        currentTranslations = {};
        document.getElementById('translate-select').value = '';
        document.getElementById('translation-bar').style.display = 'flex';

        const videoId = ytVideoId(song.url);
        currentVideoId = videoId;
        loadOffset(videoId);
        if (videoId) loadYTVideo(videoId);

        if (autoLang) {
          document.getElementById('translate-select').value = autoLang;
          await onTranslateLangChange();
        }

        startUrlUpdater();

        setTimeout(() => setProgress('hide'), 600);
      } catch (e) {
        clearInterval(pollTimer);
        pollTimer = null;
        setStatus('Error: ' + e.message, true);
        setProgress('hide');
      }
    }

    function ytVideoId(url) {
      const m = url.match(/[?&]v=([^&]+)/);
      return m ? m[1] : null;
    }

    function updateProgressUI(s) {
      const label = STAGE_LABELS[s.stage] || '';
      setStatus(label);
      if (s.stage === 'captions') setProgress(40);
      else if (s.stage === 'lrclib') setProgress(70);
    }

    function setProgress(val) {
      const isPlayer = currentScreen === 'player';
      const wrap = document.getElementById(isPlayer ? 'progress-wrap' : 'search-progress-wrap');
      const bar  = document.getElementById(isPlayer ? 'progress-bar'  : 'search-progress-bar');
      if (!wrap || !bar) return;
      if (val === 'hide') {
        wrap.style.display = 'none';
        bar.className = '';
        bar.style.width = '0%';
      } else if (val === 'indeterminate') {
        wrap.style.display = 'block';
        bar.className = 'indeterminate';
      } else if (val === 'full') {
        wrap.style.display = 'block';
        bar.className = '';
        bar.style.width = '100%';
      } else {
        wrap.style.display = 'block';
        bar.className = '';
        bar.style.width = val + '%';
      }
    }

    function renderLyrics(segs) {
      const container = document.getElementById('lyrics');
      container.innerHTML = '';
      segs.forEach((seg, si) => {
        const div = document.createElement('div');
        div.className = 'segment';
        div.id = `seg-${si}`;
        if (seg.words.length > 0) {
          seg.words.forEach((w, wi) => {
            const span = document.createElement('span');
            span.className = 'word';
            span.id = `w-${si}-${wi}`;
            span.textContent = w.word;
            div.appendChild(span);
          });
        } else {
          const textSpan = document.createElement('span');
          textSpan.textContent = seg.text;
          div.appendChild(textSpan);
        }
        const tDiv = document.createElement('div');
        tDiv.className = 'translation hidden';
        tDiv.id = `tr-${si}`;
        div.appendChild(tDiv);
        container.appendChild(div);
      });
    }

    function showTranslations(list) {
      list.forEach((text, i) => {
        const el = document.getElementById(`tr-${i}`);
        if (el) { el.textContent = text; el.classList.remove('hidden'); }
      });
    }

    function hideTranslations() {
      document.querySelectorAll('.translation').forEach(el => el.classList.add('hidden'));
    }

    async function onTranslateLangChange() {
      const lang = document.getElementById('translate-select').value;
      updateUrl();
      if (!lang) { hideTranslations(); return; }
      if (currentTranslations[lang]) { showTranslations(currentTranslations[lang]); return; }

      setStatus('Translating…');
      try {
        const res = await fetch('/api/translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ song_id: currentSongId, target_lang: lang })
        });
        const data = await res.json();
        if (data.error) { setStatus('Translation failed: ' + data.error, true); return; }
        setStatus('');
        currentTranslations[lang] = data.translations;
        showTranslations(data.translations);
      } catch (e) {
        setStatus('Translation error: ' + e.message, true);
      }
    }

    let lastSegIdx = -1;
    let lastWordIdx = -1;

    function syncLyrics(t) {
      let segIdx = -1;
      for (let i = 0; i < segments.length; i++) {
        if (t >= segments[i].start) segIdx = i;
        else break;
      }
      if (segIdx !== lastSegIdx) {
        if (lastSegIdx >= 0) document.getElementById(`seg-${lastSegIdx}`)?.classList.remove('active');
        if (segIdx >= 0) {
          const el = document.getElementById(`seg-${segIdx}`);
          el?.classList.add('active');
          el?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        lastSegIdx = segIdx;
        lastWordIdx = -1;
      }
      if (segIdx < 0) return;
      const words = segments[segIdx].words;
      let wordIdx = -1;
      for (let i = 0; i < words.length; i++) {
        if (t >= words[i].start && t <= words[i].end) { wordIdx = i; break; }
      }
      if (wordIdx !== lastWordIdx) {
        if (lastWordIdx >= 0) document.getElementById(`w-${segIdx}-${lastWordIdx}`)?.classList.remove('active');
        if (wordIdx >= 0) document.getElementById(`w-${segIdx}-${wordIdx}`)?.classList.add('active');
        lastWordIdx = wordIdx;
      }
    }

    function setStatus(msg, isError = false) {
      const id = currentScreen === 'player' ? 'status' : 'search-status';
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.className = isError ? 'error' : '';
    }

    function updateUrl() {
      if (!currentVideoId) return;
      const params = new URLSearchParams();
      params.set('v', currentVideoId);
      if (currentSongTitle) params.set('title', currentSongTitle);
      if (ytPlayer && typeof ytPlayer.getCurrentTime === 'function') {
        const t = Math.floor(ytPlayer.getCurrentTime());
        if (t > 0) params.set('t', t);
      }
      const lang = document.getElementById('translate-select').value;
      if (lang) params.set('lang', lang);
      history.replaceState(null, '', '?' + params.toString());
    }

    function startUrlUpdater() {
      if (urlUpdateTimer) clearInterval(urlUpdateTimer);
      urlUpdateTimer = setInterval(updateUrl, 2000);
    }

    function stopUrlUpdater() {
      if (urlUpdateTimer) { clearInterval(urlUpdateTimer); urlUpdateTimer = null; }
    }

    function buildShareUrl(withTime) {
      if (!currentVideoId) return window.location.href;
      const params = new URLSearchParams();
      params.set('v', currentVideoId);
      if (currentSongTitle) params.set('title', currentSongTitle);
      if (withTime && ytPlayer && typeof ytPlayer.getCurrentTime === 'function') {
        const t = Math.floor(ytPlayer.getCurrentTime());
        if (t > 0) params.set('t', t);
      }
      const lang = document.getElementById('translate-select').value;
      if (lang) params.set('lang', lang);
      return window.location.origin + window.location.pathname + '?' + params.toString();
    }

    async function copyToClipboard(url, el, label) {
      try {
        await navigator.clipboard.writeText(url);
      } catch (_) {
        const inp = document.createElement('input');
        inp.value = url;
        document.body.appendChild(inp);
        inp.select();
        document.execCommand('copy');
        document.body.removeChild(inp);
      }
      const orig = el.textContent;
      el.textContent = label;
      el.classList.add('copied');
      setTimeout(() => { el.textContent = orig; el.classList.remove('copied'); }, 2000);
    }

    async function shareUrl() {
      const btn = document.getElementById('share-btn');
      await copyToClipboard(buildShareUrl(false), btn, '✓ Copied!');
    }

    async function shareFromHere() {
      const el = document.getElementById('share-from-here');
      await copyToClipboard(buildShareUrl(true), el, '✓ Copied!');
    }

    function updateShareFromHere() {
      const el = document.getElementById('share-from-here');
      if (!currentVideoId || !ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') {
        el.style.display = 'none';
        return;
      }
      const t = Math.floor(ytPlayer.getCurrentTime());
      const mm = Math.floor(t / 60);
      const ss = String(t % 60).padStart(2, '0');
      el.style.display = 'block';
      if (!el.classList.contains('copied')) {
        el.textContent = `· from here (${mm}:${ss})`;
      }
    }

    window.addEventListener('load', async () => {
      const params = new URLSearchParams(window.location.search);
      const v = params.get('v');
      if (v) {
        const title = params.get('title') || '';
        const startTime = parseFloat(params.get('t') || '0');
        const lang = params.get('lang') || '';
        const url = `https://www.youtube.com/watch?v=${v}`;
        await selectSong({ url, title }, startTime, lang);
      }
    });

    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
  </script>
