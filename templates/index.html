<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Letras</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.2rem;
      color: #0d9488;
      letter-spacing: 3px;
      margin-bottom: 30px;
      text-shadow: 0 0 20px #0d948888;
    }

    .input-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 700px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 14px 18px;
      border-radius: 10px;
      border: 2px solid #333;
      background: #1a1a1a;
      color: #f0f0f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #0d9488; }

    button {
      padding: 14px 26px;
      border-radius: 10px;
      border: none;
      background: #0d9488;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #0f766e; }
    button:active { transform: scale(0.97); }
    button:disabled { background: #555; cursor: default; }

    .back-btn {
      background: transparent;
      color: #aaa;
      border: 1px solid #444;
      padding: 8px 18px;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }
    .back-btn:hover { background: #1a1a1a; color: #f0f0f0; }

    #share-btn {
      background: transparent;
      color: #aaa;
      border: 1px solid #444;
      padding: 6px 14px;
      font-size: 0.85rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    #share-btn:hover { background: #1a1a1a; color: #f0f0f0; border-color: #666; }
    #share-btn.copied { background: #1a3a1a; color: #5f5; border-color: #5f5; }
    #share-from-here {
      display: none;
      font-size: 0.75rem;
      color: #666;
      cursor: pointer;
      margin-top: 3px;
      text-align: center;
      transition: color 0.2s;
    }
    #share-from-here:hover { color: #aaa; }
    #share-from-here.copied { color: #5f5; }

    #player-back {
      background: transparent;
      color: #aaa;
      border: 1px solid #444;
      padding: 8px 18px;
      font-size: 0.9rem;
      border-radius: 10px;
      cursor: pointer;
    }
    #player-back:hover { background: #1a1a1a; color: #f0f0f0; }

    #status, #search-status {
      font-size: 0.95rem;
      color: #aaa;
      margin-bottom: 10px;
      min-height: 1.3em;
      text-align: center;
      width: 100%;
    }
    #status.error, #search-status.error {
      color: #ff4444;
      font-size: 1.1rem;
      font-weight: bold;
    }
    #status-hint, #search-status-hint {
      font-size: 0.78rem;
      color: #555;
      text-align: center;
      min-height: 1.2em;
      margin-top: -6px;
      margin-bottom: 8px;
      transition: opacity 0.5s;
    }

    #progress-wrap, #search-progress-wrap {
      width: 100%;
      max-width: 700px;
      height: 6px;
      background: #222;
      border-radius: 3px;
      margin-bottom: 20px;
      overflow: hidden;
      display: none;
    }
    #progress-bar, #search-progress-bar {
      height: 100%;
      width: 0%;
      background: #0d9488;
      border-radius: 3px;
      transition: width 0.6s ease;
    }
    #progress-bar.indeterminate {
      width: 40%;
      animation: slide 1.4s infinite ease-in-out;
    }
    @keyframes slide {
      0%   { transform: translateX(-150%); }
      100% { transform: translateX(350%); }
    }

    /* Results grid */
    #results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 700px;
    }

    .song-card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      border: 2px solid transparent;
      position: relative;
    }
    .song-card-badge {
      position: absolute;
      top: 7px;
      left: 7px;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.04em;
      pointer-events: none;
    }
    .badge-synced { background: #0d9488; color: #fff; }
    .badge-plain  { background: #3a3a3a; color: #bbb; }
    .badge-none   { background: #2a2a2a; color: #666; }
    .song-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px #0d948844;
      border-color: #0d9488;
    }
    .song-card--synced {
      border-color: #0d948855;
      box-shadow: 0 0 10px #0d948830;
    }
    .song-card--synced:hover {
      box-shadow: 0 8px 24px #0d948866;
      border-color: #0d9488;
    }
    .song-card--no-lrc {
      opacity: 0.65;
    }
    .song-card--no-lrc:hover {
      opacity: 1;
    }
    .song-card img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      background: #111;
    }
    .song-card-title {
      padding: 10px 12px;
      font-size: 0.85rem;
      color: #ddd;
      line-height: 1.4;
    }

    /* Player */
    #song-title {
      font-size: 1.4rem;
      font-weight: bold;
      color: #5eead4;
      margin-bottom: 8px;
      text-align: center;
      max-width: 700px;
      cursor: pointer;
      text-decoration: underline dotted #5eead466;
      transition: opacity 0.2s;
    }
    #song-title:hover { opacity: 0.8; }

    .credits-writer {
      cursor: pointer;
      text-decoration: underline dotted #555;
      transition: color 0.2s;
    }
    .credits-writer:hover { color: #5eead4; }

    #wiki-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #wiki-modal-overlay.open { display: flex; }
    #wiki-modal {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 20px 22px 0;
      max-width: 560px;
      width: 100%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 8px 40px #000a;
    }
    #wiki-modal-title {
      font-size: 1.1rem;
      font-weight: bold;
      color: #5eead4;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    #wiki-modal-body {
      font-size: 0.9rem;
      color: #ccc;
      line-height: 1.6;
      white-space: pre-line;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      padding-right: 6px;
      margin-bottom: 0;
    }
    #wiki-modal-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      flex-shrink: 0;
      padding: 12px 0 18px;
      border-top: 1px solid #222;
      margin-top: 10px;
    }
    #wiki-translate-select {
      background: #111;
      color: #aaa;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 0.82rem;
      cursor: pointer;
      outline: none;
    }
    #wiki-translate-select:hover { border-color: #555; }
    #wiki-modal-link {
      font-size: 0.78rem;
      color: #555;
      text-decoration: none;
      margin-left: auto;
    }
    #wiki-modal-link:hover { color: #aaa; }
    #wiki-modal-close {
      position: absolute;
      top: 12px;
      right: 14px;
      background: transparent;
      border: none;
      color: #666;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
    }
    #wiki-modal-close:hover { color: #ccc; background: #222; }
    #wiki-modal-loading {
      color: #555;
      font-size: 0.85rem;
      font-style: italic;
    }
    #wiki-modal-image {
      float: right;
      margin: 0 0 10px 14px;
      max-width: 120px;
      max-height: 150px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid #333;
      display: none;
    }

    #song-credits {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 4px;
      text-align: center;
      letter-spacing: 0.3px;
    }

    #translation-bar {
      display: none;
      align-items: center;
      gap: 8px;
    }
    #translate-select {
      background: #1a1a1a;
      color: #aaa;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
    }
    #translate-select:hover { border-color: #555; color: #ddd; }
    #translate-select:focus { border-color: #0d948866; }

    #top-bar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .translation {
      width: 100%;
      font-size: 0.95rem;
      color: #777;
      margin-top: 6px;
      font-style: italic;
      line-height: 1.5;
    }

    #video-row {
      width: 100%;
      max-width: 700px;
      display: flex;
      align-items: stretch;
      gap: 8px;
      margin-bottom: 8px;
    }

    #offset-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-shrink: 0;
    }
    #offset-controls button {
      padding: 5px 10px;
      font-size: 0.8rem;
      background: #222;
      border: 1px solid #444;
      color: #ccc;
      width: 52px;
    }
    #offset-controls button:hover { background: #333; color: #fff; }
    #offset-display {
      font-size: 0.75rem;
      color: #aaa;
      text-align: center;
      width: 52px;
    }

    #screen-player {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0d0d0d;
      z-index: 10;
      overflow: hidden;
      padding: 12px 20px 0;
    }

    #player-top {
      width: 100%;
      max-width: 700px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #yt-player-wrap {
      flex: 1;
      min-width: 0;
      border-radius: 12px;
      overflow: hidden;
      display: none;
      aspect-ratio: 16/9;
      background: #111;
      max-height: 32vh;
    }

    /* Responsive layout for mobile phones (width-based — more reliable than height) */
    @media (max-width: 500px) {
      #player-footer { display: none; }
      #screen-player { padding: 8px 12px 0; }
      #song-title {
        font-size: 0.9rem;
        margin-bottom: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
      }
      #song-credits {
        font-size: 0.68rem;
        margin-bottom: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
      }
      #share-from-here { display: none !important; }
      #share-btn { padding: 5px 10px; font-size: 0.78rem; }
      #translation-bar { gap: 6px; }
      #yt-player-wrap { max-height: 22vh; }
      #offset-controls button { padding: 4px 8px; font-size: 0.72rem; width: 44px; }
      #offset-display { font-size: 0.7rem; width: 44px; }
      .word { font-size: 0.95rem; }
      .translation { font-size: 0.82rem; }
      #lyrics { gap: 7px; padding-bottom: 12px; }
      .segment { padding: 8px 11px; }
    }
    @media (max-width: 500px) and (max-height: 700px) {
      #yt-player-wrap { max-height: 17vh; }
    }

    #lyrics {
      width: 100%;
      max-width: 700px;
      flex: 1;
      overflow-y: auto;
      padding: 8px 0 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #lyrics::-webkit-scrollbar { width: 4px; }
    #lyrics::-webkit-scrollbar-track { background: transparent; }
    #lyrics::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* Ambient background */
    #ambient-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-size: cover;
      background-position: center;
      filter: blur(60px) saturate(2);
      opacity: 0;
      transition: opacity 1s ease;
      pointer-events: none;
      transform: scale(1.1);
    }
    #ambient-bg.visible { opacity: 0.18; }
    #player-top, #lyrics, #player-footer, #top-bar { position: relative; z-index: 1; }

    /* Top bar: back on left, zen on right */
    #top-bar {
      width: 100%;
      max-width: 700px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0 8px;
      flex-shrink: 0;
    }

    /* Zen mode button */
    #zen-btn {
      background: transparent;
      color: #666;
      border: 1px solid #333;
      padding: 4px 10px;
      font-size: 0.8rem;
      border-radius: 8px;
      cursor: pointer;
    }
    #zen-btn:hover { color: #aaa; border-color: #555; background: #1a1a1a; }

    /* Zen exit button */
    #zen-exit {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      background: rgba(0,0,0,0.5);
      color: #aaa;
      border: 1px solid #444;
      padding: 8px 16px;
      font-size: 0.85rem;
      border-radius: 20px;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }
    #zen-exit:hover { color: #fff; border-color: #888; }

    /* Zen mode state */
    #screen-player.zen #top-bar,
    #screen-player.zen #player-top,
    #screen-player.zen #player-footer { display: none !important; }
    #screen-player.zen #zen-exit { display: block; }
    #screen-player.zen #lyrics { flex: 1; }
    #screen-player.zen .word { font-size: 1.6rem; }
    #screen-player.zen .segment { padding: 18px; }
    #screen-player.zen .segment:not(.active) { opacity: 0.3; }

    .segment {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 14px 18px;
      background: #1a1a1a;
      border-radius: 12px;
      border-left: 4px solid transparent;
      transition: border-color 0.3s, background 0.3s;
      line-height: 1.8;
    }
    .segment.active {
      border-left-color: #0d9488;
      background: #042f2e;
    }
    .word {
      font-size: 1.3rem;
      padding: 2px 4px;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
    }
    .word.active {
      background: #0d9488;
      color: white;
      border-radius: 6px;
    }

    .screen {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .hidden { display: none !important; }

    #site-footer, #player-footer {
      margin-top: auto;
      padding: 18px 20px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      opacity: 0.45;
      transition: opacity 0.25s;
    }
    #site-footer:hover, #player-footer:hover { opacity: 1; }
    #site-footer a, #player-footer a { text-decoration: none; display: flex; align-items: center; }
    .footer-credit {
      color: #888;
      font-size: 0.82rem;
      letter-spacing: 0.3px;
    }
    .footer-sep {
      color: #444;
      font-size: 0.9rem;
    }

    /* Autocomplete dropdown */
    .input-row { position: relative; }
    #suggest-list {
      display: none;
      position: absolute;
      top: calc(100% - 4px);
      left: 0;
      right: 0;
      background: #1a1a1a;
      border: 2px solid #0d9488;
      border-top: none;
      border-radius: 0 0 10px 10px;
      z-index: 50;
      overflow: hidden;
    }
    #suggest-list.open { display: block; }
    .input-row:has(#suggest-list.open) input[type="text"] {
      border-bottom-color: transparent;
      border-radius: 10px 10px 0 0;
    }
    .suggest-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      font-size: 0.95rem;
      color: #ccc;
      cursor: pointer;
      border-bottom: 1px solid #222;
    }
    .suggest-item:last-child { border-bottom: none; }
    .suggest-item:hover, .suggest-item.active {
      background: #0d948820;
      color: #f0f0f0;
    }
    .suggest-icon { color: #555; font-size: 0.8rem; flex-shrink: 0; }
  </style>
</head>
<body>
  <h1>🎤 LETRAS</h1>

  <!-- Search screen -->
  <div id="screen-search" class="screen">
    <div class="input-row">
      <input type="text" id="searchInput" placeholder="Search for a song…" autocomplete="off" />
      <button id="searchBtn" onclick="doSearch()">Search</button>
      <div id="suggest-list"></div>
    </div>
    <div id="search-status"></div>
    <div id="search-status-hint"></div>
    <div id="search-progress-wrap"><div id="search-progress-bar"></div></div>
    <footer id="site-footer">
      <a href="https://www.gnu.org/licenses/gpl-3.0.html" target="_blank" rel="noopener" title="GNU General Public License v3.0">
        <svg xmlns="http://www.w3.org/2000/svg" width="116" height="22" viewBox="0 0 116 22" role="img" aria-label="license: GPL-3.0">
          <title>license: GPL-3.0</title>
          <defs>
            <clipPath id="gpl-clip">
              <rect width="116" height="22" rx="4" fill="#fff"/>
            </clipPath>
          </defs>
          <g clip-path="url(#gpl-clip)">
            <rect width="56" height="22" fill="#2a2a2a"/>
            <rect x="56" width="60" height="22" fill="#0d9488"/>
          </g>
          <text x="28" y="15" fill="#bbb" font-family="Segoe UI,DejaVu Sans,sans-serif" font-size="10.5" text-anchor="middle">license</text>
          <text x="86" y="15.5" fill="#fff" font-family="Segoe UI,DejaVu Sans,sans-serif" font-size="10.5" font-weight="bold" text-anchor="middle">GPL-3.0</text>
        </svg>
      </a>

  <script>
    // Load YouTube IFrame API dynamically
    (function() {
      var tag = document.createElement('script');
      tag.src = "https://www.youtube.com/iframe_api";
      document.head.appendChild(tag);
    })();

    var ytPlayer = null;
    var ytApiReady = false;
    var pendingVideoId = null;
    var syncTimer = null;
    var segments = [];
    var pollTimer = null;
    var syncOffset = 0;
    var currentScreen = 'search';

    window.onYouTubeIframeAPIReady = function() {
      ytApiReady = true;
      if (pendingVideoId) {
        _createOrLoadPlayer(pendingVideoId);
        pendingVideoId = null;
      }
    };

    function loadYTVideo(videoId) {
      if (!ytApiReady) {
        pendingVideoId = videoId;
        return;
      }
      _createOrLoadPlayer(videoId);
    }

    function _createOrLoadPlayer(videoId) {
      document.getElementById('yt-player-wrap').style.display = 'block';
      const seekTo = pendingSeekTime;
      pendingSeekTime = 0;
      if (ytPlayer && ytPlayer.loadVideoById) {
        if (seekTo > 0) {
          ytPlayer.loadVideoById({ videoId: videoId, startSeconds: seekTo });
        } else {
          ytPlayer.loadVideoById(videoId);
        }
        startSync();
        return;
      }
      ytPlayer = new YT.Player('yt-player', {
        width: '100%',
        height: '100%',
        videoId: videoId,
        playerVars: { autoplay: 1, rel: 0, start: seekTo > 0 ? Math.floor(seekTo) : 0 },
        events: {
          onReady: function(e) {
            if (seekTo > 0) e.target.seekTo(seekTo, true);
            e.target.playVideo();
            startSync();
          }
        }
      });
    }

    var shareUpdateCounter = 0;
    function startSync() {
      stopSync();
      syncTimer = setInterval(function() {
        if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
        syncLyrics(ytPlayer.getCurrentTime() + syncOffset);
        if (++shareUpdateCounter % 10 === 0) updateShareFromHere();
      }, 100);
    }

    var currentVideoId = null;
    var currentSongId = null;
    var currentSongTitle = '';
    var currentTranslations = {};
    var pendingSeekTime = 0;
    var urlUpdateTimer = null;
    var isSynced = true;

    function adjustOffset(delta) {
      syncOffset = Math.round((syncOffset + delta) * 10) / 10;
      document.getElementById('offset-display').textContent = (syncOffset >= 0 ? '+' : '') + syncOffset.toFixed(1) + 's';
      if (currentVideoId) localStorage.setItem('letras_offset_' + currentVideoId, syncOffset);
    }

    function loadOffset(videoId) {
      const stored = localStorage.getItem('letras_offset_' + videoId);
      syncOffset = stored !== null ? parseFloat(stored) : 0;
      document.getElementById('offset-display').textContent = (syncOffset >= 0 ? '+' : '') + syncOffset.toFixed(1) + 's';
    }

    function stopSync() {
      if (syncTimer) { clearInterval(syncTimer); syncTimer = null; }
    }

    function stopPlayer() {
      stopSync();
      if (ytPlayer && ytPlayer.stopVideo) ytPlayer.stopVideo();
      document.getElementById('yt-player-wrap').style.display = 'none';
    }

    const CREDITS_LABELS = {
      he: { lyrics: 'מילים', music: 'לחן', both: 'מילים ולחן', arranger: 'עיבוד', performer: 'מבצע' },
      en: { lyrics: 'Lyrics', music: 'Music', both: 'Music & Lyrics', arranger: 'Arr.', performer: 'By' },
      ar: { lyrics: 'كلمات', music: 'ألحان', both: 'كلمات وألحان', arranger: 'توزيع', performer: 'أداء' },
      ru: { lyrics: 'Слова', music: 'Музыка', both: 'Слова и музыка', arranger: 'Аранж.', performer: 'Исп.' },
      fr: { lyrics: 'Paroles', music: 'Musique', both: 'Paroles et Musique', arranger: 'Arr.', performer: 'Par' },
      es: { lyrics: 'Letra', music: 'Música', both: 'Letra y Música', arranger: 'Arr.', performer: 'Por' },
      it: { lyrics: 'Testo', music: 'Musica', both: 'Testo e Musica', arranger: 'Arr.', performer: 'Perf.' },
      de: { lyrics: 'Text', music: 'Musik', both: 'Text und Musik', arranger: 'Arr.', performer: 'Von' },
      pt: { lyrics: 'Letra', music: 'Música', both: 'Letra e Música', arranger: 'Arr.', performer: 'Por' },
      ja: { lyrics: '作詞', music: '作曲', both: '作詞・作曲', arranger: '編曲', performer: '歌' },
      ko: { lyrics: '작사', music: '작곡', both: '작사·작곡', arranger: '편곡', performer: '노래' },
      zh: { lyrics: '词曲', music: '作曲', both: '词曲', arranger: '编曲', performer: '演唱' },
    };

    let wikiSongData = null;       // { song_title, artist, lang }
    let wikiOriginalText = null;   // original Wikipedia summary (untranslated)
    let wikiTranslationCache = {}; // lang → translated text
    let wikiHoverMode = false;     // true = opened by hover (auto-closes on mouse-out)
    let wikiCloseTimer = null;
    let wikiCurrentKey = null;     // key of what's currently shown/loading
    const wikiCache = {};          // key → API response (avoid re-fetching)

    function _wikiKey(s) { return `${s.song_title}|${s.artist}|${s.lang}`; }
    function _cancelWikiClose() { clearTimeout(wikiCloseTimer); }
    // fromModal=true → user left the popup itself (short grace, 300ms)
    // fromModal=false → user left the trigger link (long grace, 2000ms to reach the centered modal)
    function _scheduleWikiClose(fromModal) {
      if (!wikiHoverMode) return;
      wikiCloseTimer = setTimeout(() => { closeWikiModal(); }, fromModal ? 800 : 2000);
    }
    function _isWikiOpen() {
      return document.getElementById('wiki-modal-overlay').classList.contains('open');
    }

    function renderCredits(data) {
      const labels = CREDITS_LABELS[data.lang] || CREDITS_LABELS.en;
      const lang = data.lang || 'en';
      const lyricist  = data.lyricist  || null;
      const composer  = data.composer  || null;
      const arranger  = data.arranger  || null;
      const performer = data.performer || null;

      const container = document.getElementById('song-credits');
      container.textContent = '';

      // Helper: append "Label: " then each name as a hoverable/clickable wiki span
      function appendCredit(label, namesStr) {
        container.appendChild(document.createTextNode(`${label}: `));
        namesStr.split(/,\s*/).forEach((name, i) => {
          if (i > 0) container.appendChild(document.createTextNode(', '));
          const span = document.createElement('span');
          span.className = 'credits-writer';
          span.textContent = name.trim();
          span.title = 'Wikipedia';
          const subject = { song_title: name.trim(), artist: '', lang };
          let hoverTimer = null;
          span.addEventListener('mouseenter', () => {
            _cancelWikiClose();
            if (_isWikiOpen() && wikiCurrentKey === _wikiKey(subject)) return;
            hoverTimer = setTimeout(() => { wikiHoverMode = true; openWikiModal(subject); }, 400);
          });
          span.addEventListener('mouseleave', () => { clearTimeout(hoverTimer); _scheduleWikiClose(false); });
          span.onclick = () => { clearTimeout(hoverTimer); _cancelWikiClose(); wikiHoverMode = false; openWikiModal(subject); };
          container.appendChild(span);
        });
      }

      const parts = [];
      if (performer) parts.push(() => appendCredit(labels.performer, performer));
      if (lyricist && composer && lyricist === composer) {
        parts.push(() => appendCredit(labels.both, lyricist));
      } else {
        if (composer) parts.push(() => appendCredit(labels.music, composer));
        if (lyricist) parts.push(() => appendCredit(labels.lyrics, lyricist));
      }
      if (arranger) parts.push(() => appendCredit(labels.arranger, arranger));

      parts.forEach((fn, i) => {
        if (i > 0) container.appendChild(document.createTextNode(' · '));
        fn();
      });

      // Song title click → opens wiki modal for the song
      const songSubject = {
        song_title: data.title || currentSongTitle || '',
        artist: performer || '',
        lang,
      };
      const songTitleEl = document.getElementById('song-title');
      let songTitleHoverTimer = null;
      songTitleEl.onmouseenter = () => {
        _cancelWikiClose();
        if (_isWikiOpen() && wikiCurrentKey === _wikiKey(songSubject)) return;
        songTitleHoverTimer = setTimeout(() => { wikiHoverMode = true; openWikiModal(songSubject); }, 400);
      };
      songTitleEl.onmouseleave = () => { clearTimeout(songTitleHoverTimer); _scheduleWikiClose(false); };
      songTitleEl.onclick = () => { clearTimeout(songTitleHoverTimer); _cancelWikiClose(); wikiHoverMode = false; openWikiModal(songSubject); };

      wikiOriginalText = null;
      wikiTranslationCache = {};
    }

    function _renderWikiData(data) {
      wikiOriginalText = data.content || data.summary;
      wikiTranslationCache = {};
      document.getElementById('wiki-modal-title').textContent = data.title;
      document.getElementById('wiki-translate-select').value = '';
      const body = document.getElementById('wiki-modal-body');
      body.innerHTML = '';
      if (data.image) {
        const imgEl = document.createElement('img');
        imgEl.id = 'wiki-modal-image';
        imgEl.alt = data.title;
        imgEl.src = data.image;
        body.appendChild(imgEl);
      }
      body.appendChild(document.createTextNode(data.content || data.summary));
      if (data.url) document.getElementById('wiki-modal-link').href = data.url;
    }

    async function openWikiModal(subject) {
      wikiSongData = subject;
      const key = _wikiKey(subject);
      wikiCurrentKey = key;

      const overlay = document.getElementById('wiki-modal-overlay');
      overlay.classList.add('open');
      _applyWikiOverlayMode();
      document.getElementById('wiki-modal-link').href = '#';

      // Serve from cache instantly — no flicker, no network wait
      if (wikiCache[key]) {
        _renderWikiData(wikiCache[key]);
        return;
      }

      document.getElementById('wiki-modal-title').textContent = '';
      document.getElementById('wiki-modal-body').innerHTML = '<span id="wiki-modal-loading">Searching Wikipedia…</span>';
      document.getElementById('wiki-translate-select').value = '';

      try {
        const res = await fetch('/api/wikipedia', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(wikiSongData),
        });
        const data = await res.json();
        // Discard if user already moved to a different subject
        if (wikiCurrentKey !== key) return;
        if (!data.found || !data.summary) {
          document.getElementById('wiki-modal-body').textContent = 'No Wikipedia article found for this song.';
          return;
        }
        wikiCache[key] = data;
        _renderWikiData(data);
      } catch (e) {
        document.getElementById('wiki-modal-body').textContent = 'Error loading Wikipedia.';
      }
    }

    function _applyWikiOverlayMode() {
      const overlay = document.getElementById('wiki-modal-overlay');
      if (wikiHoverMode) {
        overlay.style.background = 'transparent';
        overlay.style.pointerEvents = 'none';
        document.getElementById('wiki-modal').style.pointerEvents = 'auto';
      } else {
        overlay.style.background = '#000000aa';
        overlay.style.pointerEvents = 'auto';
        document.getElementById('wiki-modal').style.pointerEvents = '';
      }
    }
    function _pinWikiModal() {
      if (!wikiHoverMode) return;
      wikiHoverMode = false;
      _cancelWikiClose();
      _applyWikiOverlayMode();
    }
    function closeWikiModal() {
      const overlay = document.getElementById('wiki-modal-overlay');
      overlay.classList.remove('open');
      overlay.style.background = '';
      overlay.style.pointerEvents = '';
      document.getElementById('wiki-modal').style.pointerEvents = '';
      wikiHoverMode = false;
    }

    function onWikiOverlayClick(e) {
      if (e.target === document.getElementById('wiki-modal-overlay')) closeWikiModal();
    }

    async function onWikiTranslate() {
      const lang = document.getElementById('wiki-translate-select').value;
      if (!lang || !wikiOriginalText) return;

      if (!lang) {
        document.getElementById('wiki-modal-body').textContent = wikiOriginalText;
        return;
      }
      if (wikiTranslationCache[lang]) {
        document.getElementById('wiki-modal-body').textContent = wikiTranslationCache[lang];
        return;
      }

      document.getElementById('wiki-modal-body').innerHTML = '<span id="wiki-modal-loading">Translating…</span>';
      try {
        const res = await fetch('/api/translate_text', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            text: wikiOriginalText,
            source_lang: wikiSongData.lang || 'en',
            target_lang: lang,
          }),
        });
        const data = await res.json();
        const result = data.translated || wikiOriginalText;
        wikiTranslationCache[lang] = result;
        document.getElementById('wiki-modal-body').textContent = result;
      } catch (e) {
        document.getElementById('wiki-modal-body').textContent = wikiOriginalText;
      }
    }

    const STAGE_LABELS = {
      starting:  { label: 'Starting…',                hint: 'Connecting to YouTube…' },
      captions:  { label: 'Fetching captions…',       hint: 'Looking for word-by-word timing in YouTube auto-captions' },
      lrclib:    { label: 'Searching lyrics…',        hint: 'No captions found — checking LRClib lyrics database' },
      cached:    { label: 'Loading from cache…',      hint: '' },
    };
    // Time-based escalation hints per stage (seconds → message)
    const STAGE_HINTS_TIMED = {
      starting:  [[8,  'Cold start — server is waking up, hang tight…'], [20, 'Still starting… (Railway free tier wakes up slowly)']],
      captions:  [[10, 'YouTube is slow to respond — almost there…']],
      lrclib:    [[8,  'Checking multiple lyrics databases…']],
    };

    let _hintStage = null, _hintTimers = [];

    function showScreen(name) {
      currentScreen = name;
      ['search', 'results', 'player'].forEach(s => {
        document.getElementById(`screen-${s}`).classList.toggle('hidden', s !== name);
      });
    }

    function showSearch() {
      stopUrlUpdater();
      history.replaceState(null, '', '/');
      showScreen('search');
      setStatus('');
      setProgress('hide');
    }

    function showResults() {
      stopUrlUpdater();
      history.replaceState(null, '', '/');
      stopPlayer();
      document.getElementById('translation-bar').style.display = 'none';
      const player = document.getElementById('screen-player');
      player.classList.remove('zen');
      document.removeEventListener('keydown', onZenKeydown);
      document.getElementById('ambient-bg').classList.remove('visible');
      showScreen('results');
      setStatus('');
      setProgress('hide');
    }

    async function doSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;

      const btn = document.getElementById('searchBtn');
      btn.disabled = true;
      setStatus('Searching…');
      setProgress('indeterminate');

      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();

        setProgress('hide');

        if (!data.results || data.results.length === 0) {
          setStatus('No songs found with available lyrics. Try a different search.', true);
          btn.disabled = false;
          return;
        }

        renderResults(data.results);
        setStatus('');
        showScreen('results');
      } catch (e) {
        setStatus('Search failed: ' + e.message, true);
        setProgress('hide');
      }

      btn.disabled = false;
    }

    function renderResults(results) {
      const grid = document.getElementById('results-grid');
      grid.innerHTML = '';
      const BADGES = {
        synced: { cls: 'badge-synced', label: '♪ Synced' },
        plain:  { cls: 'badge-plain',  label: '♪ Lyrics' },
        none:   { cls: 'badge-none',   label: '? Unknown' },
      };
      results.forEach(r => {
        const status = r.lrc_status || (r.has_lrc ? 'synced' : 'none');
        const cardCls = status === 'synced' ? 'song-card--synced' : status === 'none' ? 'song-card--no-lrc' : '';
        const badge = BADGES[status] || BADGES.none;
        const card = document.createElement('div');
        card.className = 'song-card ' + cardCls;
        card.innerHTML = `
          <div class="song-card-badge ${badge.cls}">${badge.label}</div>
          <img src="${r.thumbnail}" alt="" loading="lazy" onerror="this.style.background='#222'">
          <div class="song-card-title">${r.title}</div>
        `;
        card.onclick = () => selectSong(r);
        grid.appendChild(card);
      });
    }

    async function selectSong(song, startTime = 0, autoLang = '') {
      showScreen('player');
      document.getElementById('song-title').textContent = '';
      document.getElementById('song-credits').textContent = '';
      document.getElementById('lyrics').innerHTML = '';
      stopPlayer();
      pendingSeekTime = startTime;

      setStatus('Starting…');
      _startHintTimers('starting');
      setProgress('indeterminate');

      let jobId = null;
      try {
        const idRes = await fetch('/api/job_id', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: song.url })
        });
        jobId = (await idRes.json()).id;
      } catch (_) {}

      if (jobId) {
        pollTimer = setInterval(async () => {
          try {
            const r = await fetch(`/api/status/${jobId}`);
            const s = await r.json();
            updateProgressUI(s);
          } catch (_) {}
        }, 800);
      }

      try {
        const res = await fetch('/api/process', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: song.url, title: song.title })
        });
        const data = await res.json();

        clearInterval(pollTimer);
        pollTimer = null;

        if (data.error) {
          setStatus(data.error, true);
          setProgress('hide');
          return;
        }

        setProgress('full');
        setStatus('');
        _clearHintTimers();
        _setHint('');
        segments = data.segments || [];
        isSynced = data.synced !== false;
        currentSongTitle = data.title || song.title;
        document.getElementById('song-title').textContent = currentSongTitle;
        renderCredits(data);
        const sourceMap = { youtube_captions: 'YouTube captions', lrclib: 'LRClib', lrclib_plain: 'LRClib (no sync)', none: 'none', cached: 'cached' };
        console.log('[Letras] Lyrics source:', sourceMap[data.source] || data.source || 'unknown');
        renderLyrics(segments, isSynced);

        currentSongId = data.id;
        currentTranslations = {};
        document.getElementById('translate-select').value = '';
        document.getElementById('translation-bar').style.display = segments.length ? 'flex' : 'none';

        const videoId = ytVideoId(song.url);
        currentVideoId = videoId;
        loadOffset(videoId);
        if (videoId) {
          loadYTVideo(videoId);
          const bg = document.getElementById('ambient-bg');
          bg.style.backgroundImage = `url(https://img.youtube.com/vi/${videoId}/maxresdefault.jpg)`;
          bg.classList.add('visible');
        }

        if (autoLang) {
          document.getElementById('translate-select').value = autoLang;
          await onTranslateLangChange();
        }

        startUrlUpdater();

        setTimeout(() => setProgress('hide'), 600);
      } catch (e) {
        clearInterval(pollTimer);
        pollTimer = null;
        setStatus('Error: ' + e.message, true);
        _clearHintTimers();
        _setHint('');
        setProgress('hide');
      }
    }

    function ytVideoId(url) {
      const m = url.match(/[?&]v=([^&]+)/);
      return m ? m[1] : null;
    }

    function _clearHintTimers() {
      _hintTimers.forEach(t => clearTimeout(t));
      _hintTimers = [];
      _hintStage = null;
    }

    function _setHint(msg) {
      const isPlayer = currentScreen === 'player';
      const el = document.getElementById(isPlayer ? 'status-hint' : 'search-status-hint');
      if (el) el.textContent = msg;
    }

    function _startHintTimers(stage) {
      if (_hintStage === stage) return;   // already running for this stage
      _clearHintTimers();
      _hintStage = stage;
      const info = STAGE_LABELS[stage];
      _setHint(info ? info.hint : '');
      const timed = STAGE_HINTS_TIMED[stage] || [];
      timed.forEach(([sec, msg]) => {
        _hintTimers.push(setTimeout(() => { if (_hintStage === stage) _setHint(msg); }, sec * 1000));
      });
    }

    function updateProgressUI(s) {
      const info = STAGE_LABELS[s.stage];
      setStatus(info ? info.label : '');
      _startHintTimers(s.stage);
      if (s.stage === 'captions') setProgress(40);
      else if (s.stage === 'lrclib') setProgress(60);
    }

    function setProgress(val) {
      const isPlayer = currentScreen === 'player';
      const wrap = document.getElementById(isPlayer ? 'progress-wrap' : 'search-progress-wrap');
      const bar  = document.getElementById(isPlayer ? 'progress-bar'  : 'search-progress-bar');
      if (!wrap || !bar) return;
      if (val === 'hide') {
        wrap.style.display = 'none';
        bar.className = '';
        bar.style.width = '0%';
      } else if (val === 'indeterminate') {
        wrap.style.display = 'block';
        bar.className = 'indeterminate';
      } else if (val === 'full') {
        wrap.style.display = 'block';
        bar.className = '';
        bar.style.width = '100%';
      } else {
        wrap.style.display = 'block';
        bar.className = '';
        bar.style.width = val + '%';
      }
    }

    function renderLyrics(segs, synced = true) {
      const container = document.getElementById('lyrics');
      container.innerHTML = '';
      if (!segs.length) {
        const notice = document.createElement('div');
        notice.style.cssText = 'font-size:0.85rem;color:#555;text-align:center;margin-top:24px;';
        notice.textContent = '♪ No lyrics found for this song';
        container.appendChild(notice);
        return;
      }
      if (!synced) {
        const notice = document.createElement('div');
        notice.style.cssText = 'font-size:0.75rem;color:#555;text-align:center;margin-bottom:12px;';
        notice.textContent = '♪ lyrics only — no sync';
        container.appendChild(notice);
      }
      segs.forEach((seg, si) => {
        const div = document.createElement('div');
        div.className = 'segment';
        div.id = `seg-${si}`;
        if (seg.words.length > 0) {
          seg.words.forEach((w, wi) => {
            const span = document.createElement('span');
            span.className = 'word';
            span.id = `w-${si}-${wi}`;
            span.textContent = w.word;
            div.appendChild(span);
          });
        } else {
          const textSpan = document.createElement('span');
          textSpan.textContent = seg.text;
          div.appendChild(textSpan);
        }
        const tDiv = document.createElement('div');
        tDiv.className = 'translation hidden';
        tDiv.id = `tr-${si}`;
        div.appendChild(tDiv);
        container.appendChild(div);
      });
    }

    function showTranslations(list) {
      list.forEach((text, i) => {
        const el = document.getElementById(`tr-${i}`);
        if (el) { el.textContent = text; el.classList.remove('hidden'); }
      });
    }

    function hideTranslations() {
      document.querySelectorAll('.translation').forEach(el => el.classList.add('hidden'));
    }

    async function onTranslateLangChange() {
      const lang = document.getElementById('translate-select').value;
      updateUrl();
      if (!lang) { hideTranslations(); return; }
      if (currentTranslations[lang]) { showTranslations(currentTranslations[lang]); return; }

      setStatus('Translating…');
      try {
        const res = await fetch('/api/translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ song_id: currentSongId, target_lang: lang })
        });
        const data = await res.json();
        if (data.error) { setStatus('Translation failed: ' + data.error, true); return; }
        setStatus('');
        currentTranslations[lang] = data.translations;
        showTranslations(data.translations);
      } catch (e) {
        setStatus('Translation error: ' + e.message, true);
      }
    }

    let lastSegIdx = -1;
    let lastWordIdx = -1;

    function syncLyrics(t) {
      if (!isSynced) return;
      let segIdx = -1;
      for (let i = 0; i < segments.length; i++) {
        if (t >= segments[i].start) segIdx = i;
        else break;
      }
      if (segIdx !== lastSegIdx) {
        if (lastSegIdx >= 0) document.getElementById(`seg-${lastSegIdx}`)?.classList.remove('active');
        if (segIdx >= 0) {
          const el = document.getElementById(`seg-${segIdx}`);
          el?.classList.add('active');
          el?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        lastSegIdx = segIdx;
        lastWordIdx = -1;
      }
      if (segIdx < 0) return;
      const words = segments[segIdx].words;
      let wordIdx = -1;
      for (let i = 0; i < words.length; i++) {
        if (t >= words[i].start && t <= words[i].end) { wordIdx = i; break; }
      }
      if (wordIdx !== lastWordIdx) {
        if (lastWordIdx >= 0) document.getElementById(`w-${segIdx}-${lastWordIdx}`)?.classList.remove('active');
        if (wordIdx >= 0) document.getElementById(`w-${segIdx}-${wordIdx}`)?.classList.add('active');
        lastWordIdx = wordIdx;
      }
    }

    function setStatus(msg, isError = false) {
      const id = currentScreen === 'player' ? 'status' : 'search-status';
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.className = isError ? 'error' : '';
    }

    function updateUrl() {
      if (!currentVideoId) return;
      const params = new URLSearchParams();
      params.set('v', currentVideoId);
      if (currentSongTitle) params.set('title', currentSongTitle);
      if (ytPlayer && typeof ytPlayer.getCurrentTime === 'function') {
        const t = Math.floor(ytPlayer.getCurrentTime());
        if (t > 0) params.set('t', t);
      }
      const lang = document.getElementById('translate-select').value;
      if (lang) params.set('lang', lang);
      history.replaceState(null, '', '?' + params.toString());
    }

    function startUrlUpdater() {
      if (urlUpdateTimer) clearInterval(urlUpdateTimer);
      urlUpdateTimer = setInterval(updateUrl, 2000);
    }

    function stopUrlUpdater() {
      if (urlUpdateTimer) { clearInterval(urlUpdateTimer); urlUpdateTimer = null; }
    }

    function buildShareUrl(withTime) {
      if (!currentVideoId) return window.location.href;
      const params = new URLSearchParams();
      params.set('v', currentVideoId);
      if (currentSongTitle) params.set('title', currentSongTitle);
      if (withTime && ytPlayer && typeof ytPlayer.getCurrentTime === 'function') {
        const t = Math.floor(ytPlayer.getCurrentTime());
        if (t > 0) params.set('t', t);
      }
      const lang = document.getElementById('translate-select').value;
      if (lang) params.set('lang', lang);
      return window.location.origin + window.location.pathname + '?' + params.toString();
    }

    async function copyToClipboard(url, el, label) {
      try {
        await navigator.clipboard.writeText(url);
      } catch (_) {
        const inp = document.createElement('input');
        inp.value = url;
        document.body.appendChild(inp);
        inp.select();
        document.execCommand('copy');
        document.body.removeChild(inp);
      }
      const orig = el.textContent;
      el.textContent = label;
      el.classList.add('copied');
      setTimeout(() => { el.textContent = orig; el.classList.remove('copied'); }, 2000);
    }

    function toggleZen() {
      const player = document.getElementById('screen-player');
      player.classList.toggle('zen');
      if (player.classList.contains('zen')) {
        document.addEventListener('keydown', onZenKeydown);
      } else {
        document.removeEventListener('keydown', onZenKeydown);
      }
    }
    function onZenKeydown(e) {
      if (e.key === 'Escape') toggleZen();
    }

    async function shareUrl() {
      const btn = document.getElementById('share-btn');
      await copyToClipboard(buildShareUrl(false), btn, '✓ Copied!');
    }

    async function shareFromHere() {
      const el = document.getElementById('share-from-here');
      await copyToClipboard(buildShareUrl(true), el, '✓ Copied!');
    }

    function updateShareFromHere() {
      const el = document.getElementById('share-from-here');
      if (!currentVideoId || !ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') {
        el.style.display = 'none';
        return;
      }
      const t = Math.floor(ytPlayer.getCurrentTime());
      const mm = Math.floor(t / 60);
      const ss = String(t % 60).padStart(2, '0');
      el.style.display = 'block';
      if (!el.classList.contains('copied')) {
        el.textContent = `· from here (${mm}:${ss})`;
      }
    }

    window.addEventListener('load', async () => {
      const params = new URLSearchParams(window.location.search);
      const v = params.get('v');
      if (v) {
        const title = params.get('title') || '';
        const startTime = parseFloat(params.get('t') || '0');
        const lang = params.get('lang') || '';
        const url = `https://www.youtube.com/watch?v=${v}`;
        await selectSong({ url, title }, startTime, lang);
      }
    });

    // Autocomplete
    var suggestTimer = null;
    var suggestActive = -1;
    var suggestOrigQuery = '';

    function closeSuggest() {
      document.getElementById('suggest-list').classList.remove('open');
      suggestActive = -1;
    }

    function openSuggest(items) {
      var list = document.getElementById('suggest-list');
      if (!items.length) { closeSuggest(); return; }
      list.innerHTML = items.map(function(s, i) {
        var esc = s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return '<div class="suggest-item" data-idx="' + i + '"><span class="suggest-icon">&#x1F50D;</span>' + esc + '</div>';
      }).join('');
      list._items = items;
      suggestActive = -1;
      list.classList.add('open');
      list.querySelectorAll('.suggest-item').forEach(function(el) {
        el.addEventListener('mousedown', function(e) {
          e.preventDefault();
          chooseSuggest(parseInt(el.dataset.idx));
        });
      });
    }

    function chooseSuggest(idx) {
      var list = document.getElementById('suggest-list');
      var items = list._items || [];
      if (items[idx] !== undefined) {
        document.getElementById('searchInput').value = items[idx];
        closeSuggest();
        doSearch();
      }
    }

    function updateSuggestActive(list) {
      var items = list._items || [];
      list.querySelectorAll('.suggest-item').forEach(function(el, i) {
        el.classList.toggle('active', i === suggestActive);
      });
      if (suggestActive >= 0 && items[suggestActive] !== undefined) {
        document.getElementById('searchInput').value = items[suggestActive];
      } else {
        document.getElementById('searchInput').value = suggestOrigQuery;
      }
    }

    document.getElementById('searchInput').addEventListener('input', function() {
      var q = this.value.trim();
      suggestOrigQuery = q;
      clearTimeout(suggestTimer);
      if (!q) { closeSuggest(); return; }
      suggestTimer = setTimeout(async function() {
        try {
          var res = await fetch('/api/suggest?q=' + encodeURIComponent(suggestOrigQuery));
          var data = await res.json();
          openSuggest(data.suggestions || []);
        } catch(e) { closeSuggest(); }
      }, 220);
    });

    document.getElementById('searchInput').addEventListener('keydown', function(e) {
      var list = document.getElementById('suggest-list');
      var isOpen = list.classList.contains('open');
      var items = list._items || [];
      if (isOpen && items.length) {
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          suggestActive = Math.min(suggestActive + 1, items.length - 1);
          updateSuggestActive(list);
          return;
        }
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          suggestActive = Math.max(suggestActive - 1, -1);
          updateSuggestActive(list);
          return;
        }
        if (e.key === 'Escape') {
          document.getElementById('searchInput').value = suggestOrigQuery;
          closeSuggest();
          return;
        }
        if (e.key === 'Enter') {
          if (suggestActive >= 0) { chooseSuggest(suggestActive); }
          else { closeSuggest(); doSearch(); }
          return;
        }
      }
      if (e.key === 'Enter') doSearch();
    });

    document.addEventListener('mousedown', function(e) {
      if (!e.target.closest('#suggest-list') && e.target.id !== 'searchInput') {
        closeSuggest();
      }
    });

    document.addEventListener('keydown', e => {
      if (currentScreen !== 'player') return;
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
      if (e.key === ' ') {
        e.preventDefault();
        if (ytPlayer && ytPlayer.getPlayerState) {
          if (ytPlayer.getPlayerState() === 1) ytPlayer.pauseVideo();
          else ytPlayer.playVideo();
        }
      }
      if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
        e.preventDefault();
        if (ytPlayer && typeof ytPlayer.getCurrentTime === 'function' && segments.length) {
          const t = ytPlayer.getCurrentTime();
          let target = null;
          if (e.key === 'ArrowRight') {
            target = segments.find(s => s.start > t + 0.1);
          } else {
            const prev = segments.filter(s => s.start < t - 0.5);
            target = prev.length ? prev[prev.length - 1] : segments[0];
          }
          if (target) ytPlayer.seekTo(target.start, true);
        }
      }
    });
  </script>
